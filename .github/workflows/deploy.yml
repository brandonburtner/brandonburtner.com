name: Deploy Sites

on:
  push:
    branches: [ main ]
    paths:
      - 'family-points/**'
      - 'dough-calculator/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Family Bank ──────────────────────────────────────────
      - name: Install dependencies (family-points)
        working-directory: family-points
        run: npm install

      - name: Build (family-points)
        working-directory: family-points
        run: npm run build

      - name: Copy built files (family-bank)
        run: |
          mkdir -p family-bank
          cp -r family-points/dist/. family-bank/
          cp family-bank/index.html family-bank/404.html

      # ── Dough Calculator ─────────────────────────────────────
      - name: Install dependencies (dough-calculator)
        working-directory: dough-calculator
        run: npm install

      - name: Build (dough-calculator)
        working-directory: dough-calculator
        run: npm run build

      - name: Copy built files (dough-calculator)
        run: |
          mkdir -p dough-calculator-build
          cp -r dough-calculator/dist/. dough-calculator-build/
          cp dough-calculator-build/index.html dough-calculator-build/404.html

      # ── Commit & Push ─────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f family-bank/
          git add -f dough-calculator-build/
          git diff --staged --quiet || git commit -m "Deploy builds"
          git push
