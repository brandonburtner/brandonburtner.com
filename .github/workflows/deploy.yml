name: Deploy Family Bank

on:
  push:
    branches: [ main ]
    paths:
      - 'family-points/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: family-points
        run: npm install

      - name: Build
        working-directory: family-points
        run: npm run build

      - name: Copy built files
        run: |
          mkdir -p family-bank
          cp -r family-points/dist/. family-bank/
          cp family-bank/index.html family-bank/404.html

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f family-bank/
          git diff --staged --quiet || git commit -m "Deploy family-bank build"
          git push
